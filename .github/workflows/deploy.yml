name: Deploy to Production

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: msufyanmughal01/newfbrwdocker

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Code quality — lint, typecheck, tests
  # ─────────────────────────────────────────────
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Node version matches Dockerfile NODE_VERSION to avoid subtle divergence
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test -- --run --passWithNoTests

  # ─────────────────────────────────────────────
  # Job 2: Build and push Docker image
  # ─────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_TELEMETRY_DISABLED=1

  # ─────────────────────────────────────────────
  # Job 3: Deploy to production server
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy config files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "nginx.conf,docker-compose.yml"
          target: /opt/easydigital/
          overwrite: true

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          FULL_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: FULL_IMAGE,DOMAIN_NAME
          script: |
            set -euo pipefail
            cd /opt/easydigital

            # Replace YOUR_DOMAIN placeholder in nginx.conf with the real domain.
            # This is safe to run on every deploy — idempotent once replaced.
            if grep -q "YOUR_DOMAIN" nginx.conf 2>/dev/null; then
              echo "Replacing YOUR_DOMAIN with ${DOMAIN_NAME} in nginx.conf..."
              sed -i "s/YOUR_DOMAIN/${DOMAIN_NAME}/g" nginx.conf
              echo "nginx.conf updated."
            fi

            # Capture the currently-running image ID for rollback
            PREV_IMAGE=$(docker inspect easydigital-app --format='{{.Image}}' 2>/dev/null || echo "")

            # Pull new image before stopping old container
            docker pull "${FULL_IMAGE}"

            # Zero-downtime rolling restart:
            # Recreate only the app container; --no-deps leaves nginx untouched.
            APP_IMAGE="${FULL_IMAGE}" docker compose up -d --no-deps --force-recreate app

            # Wait for health check (up to 60 s, polling every 5 s)
            echo "Waiting for health check..."
            HEALTHY=0
            for i in $(seq 1 12); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' easydigital-app 2>/dev/null || echo "unknown")
              if [ "$STATUS" = "healthy" ]; then
                echo "App is healthy after $((i * 5))s"
                HEALTHY=1
                break
              fi
              echo "  attempt $i/12 — status: $STATUS"
              sleep 5
            done

            if [ "$HEALTHY" = "0" ]; then
              echo "ERROR: App failed health check after 60s"
              # Rollback: restart the container using the previous image digest
              if [ -n "$PREV_IMAGE" ]; then
                echo "Rolling back to previous image: ${PREV_IMAGE}"
                docker stop easydigital-app || true
                docker rm easydigital-app || true
                docker run -d \
                  --name easydigital-app \
                  --env-file .env.production \
                  --network easydigital_easydigital-net \
                  --restart unless-stopped \
                  "${PREV_IMAGE}" || echo "Rollback failed — manual intervention required"
              else
                echo "No previous image recorded — manual intervention required"
              fi
              exit 1
            fi

            docker system prune -f
            echo "Deployment complete at $(date)"
