# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.override.yml — Local development overrides
#
# Applied automatically by Docker Compose when running `docker compose up`.
# Swaps the production nginx.conf (HTTPS + dual certs) for nginx.local.conf
# (HTTP-only, no SSL required).
#
# Usage:
#   docker compose up                    ← applies this override (local dev)
#   docker compose -f docker-compose.yml --profile production up -d  ← prod only
#
# Volume note:
#   Docker Compose MERGES volume lists from base + override files; it does not
#   replace them. The certbot-etc and certbot-www named volumes from the base
#   compose file are still created and mounted, but they will be empty.
#   This is harmless — nginx.local.conf references no SSL paths.
#   The certbot service is NOT started here (it uses `profiles: [production]`).
# ─────────────────────────────────────────────────────────────────────────────

services:
  nginx:
    # Only expose HTTP in local dev
    ports:
      - "80:80"
    volumes:
      # Overrides /etc/nginx/nginx.conf mount (same target path → last one wins)
      - ./nginx.local.conf:/etc/nginx/nginx.conf:ro
