version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taxdigital-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost}
    networks:
      - taxdigital-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  nginx:
    image: nginx:alpine
    container_name: taxdigital-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - taxdigital-net

networks:
  taxdigital-net:
    driver: bridge
