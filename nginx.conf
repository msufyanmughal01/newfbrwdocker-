# ─────────────────────────────────────────────────────────────────────────────
# Nginx Production Configuration — Next.js + Let's Encrypt dual-cert (RSA + ECDSA)
#
# Prerequisites before first use:
#   1. Replace every occurrence of easydigitalinvoice.com with your actual domain.
#   2. Run: ./scripts/init-letsencrypt.sh easydigitalinvoice.com admin@easydigitalinvoice.com
#      (issues both RSA and ECDSA certs and generates dhparam.pem)
#
# Local development:
#   docker-compose.override.yml swaps this file for nginx.local.conf automatically.
#   You never need to touch this file for local dev.
#
# Dual-certificate design:
#   Nginx loads two ssl_certificate/ssl_certificate_key pairs.
#   The TLS handshake cipher determines which cert is served:
#     ECDHE-ECDSA-* ciphers → ECDSA cert (P-384, smaller key, faster handshake)
#     ECDHE-RSA-*   ciphers → RSA  cert (2048-bit, legacy client compatibility)
#   TLS 1.3 always prefers ECDSA when both are present.
# ─────────────────────────────────────────────────────────────────────────────

worker_processes     auto;          # one per CPU core
worker_rlimit_nofile 65535;         # match system ulimit -n

events {
  worker_connections 4096;
  multi_accept       on;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ── Logging ────────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" rt=$request_time uct=$upstream_connect_time';

  access_log /var/log/nginx/access.log main buffer=16k flush=5s;
  error_log  /var/log/nginx/error.log  warn;

  # ── Performance ────────────────────────────────────────────────────────────
  sendfile          on;
  tcp_nopush        on;
  tcp_nodelay       on;
  keepalive_timeout 65;
  server_tokens     off;            # hide nginx version in headers/error pages

  # ── Upstream: Next.js app ─────────────────────────────────────────────────
  upstream nextjs {
    server app:3000;
    keepalive 32;                   # persistent connections to Next.js
  }

  # ── WebSocket connection header mapping ───────────────────────────────────
  # Hardcoding 'upgrade' on non-WS requests breaks HTTP keep-alive.
  # This map emits 'upgrade' for WebSocket, 'close' otherwise.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # ── Rate limiting zones ────────────────────────────────────────────────────
  # Next.js App Router makes multiple concurrent requests per page navigation:
  # RSC payloads, prefetches, and API calls all fire simultaneously.
  # Limits must be high enough that a single user browsing normally is never hit.
  #
  # api     — 120r/m (2/s): a dashboard page can fire 8–12 API calls on load;
  #           burst=40 covers 3–4 page loads in quick succession.
  # general — 240r/m (4/s): page navigations + RSC payloads + Next.js prefetches;
  #           burst=60 covers rapid navigation without false positives.
  #
  # The app-level rate limiter (src/lib/rate-limit) enforces tighter per-action
  # limits (invoice creation, FBR submission, auth) on top of these nginx guards.
  limit_req_zone $binary_remote_addr zone=api:10m     rate=120r/m;
  limit_req_zone $binary_remote_addr zone=general:10m rate=240r/m;

  # Return 429 Too Many Requests instead of nginx's default 503
  # when the rate limit is exceeded — clients can differentiate throttling
  # from an actual server error and apply back-off correctly.
  limit_req_status 429;

  # ── Gzip compression ───────────────────────────────────────────────────────
  gzip              on;
  gzip_vary         on;
  gzip_proxied      any;
  gzip_comp_level   6;
  gzip_buffers      16 8k;
  gzip_http_version 1.1;
  gzip_types
    text/plain text/css application/json application/javascript
    text/xml application/xml image/svg+xml application/font-woff2;
  gzip_min_length 1000;

  # ── Shared TLS session cache ───────────────────────────────────────────────
  # Shared across all worker processes; 1 MB ≈ 4 000 sessions.
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 1d;
  ssl_session_tickets off;          # disable to preserve forward secrecy

  # ═══════════════════════════════════════════════════════════════════════════
  # HTTP — ACME challenge passthrough + redirect everything else to HTTPS
  # ═══════════════════════════════════════════════════════════════════════════
  server {
    listen      80;
    listen      [::]:80;
    server_name easydigitalinvoice.com www.easydigitalinvoice.com;

    # Let's Encrypt http-01 webroot challenge
    # Certbot writes challenge files here; nginx serves them.
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Everything else gets a permanent redirect to HTTPS
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ═══════════════════════════════════════════════════════════════════════════
  # HTTPS — Production server
  # ═══════════════════════════════════════════════════════════════════════════
  server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;                 # HTTP/2 support (nginx ≥ 1.25.1)
    server_name easydigitalinvoice.com www.easydigitalinvoice.com;

    # ── TLS certificate ────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/easydigitalinvoice.com-rsa/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/easydigitalinvoice.com-rsa/privkey.pem;

    # ── TLS protocol versions ──────────────────────────────────────────────
    # TLS 1.0 and 1.1 are deprecated (RFC 8996); only 1.2 and 1.3 allowed.
    ssl_protocols TLSv1.2 TLSv1.3;

    # ── Cipher suites ──────────────────────────────────────────────────────
    # Ordering strategy for TLS 1.2 (TLS 1.3 suites are fixed and non-configurable):
    #   1. ECDSA ciphers first  → nginx uses the ECDSA cert for these
    #   2. RSA ciphers after    → nginx uses the RSA cert for these
    #   3. CHACHA20 variants    → optimal for mobile CPUs without AES-NI
    # No: RC4, 3DES, EXPORT, aNULL, MD5, SEED, or CBC-mode (for TLS 1.2 AEAD only)
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    # OFF: let the client pick order for TLS 1.3; server order still applies to TLS 1.2.
    ssl_prefer_server_ciphers off;

    # ── DH parameters for DHE key exchange (TLS 1.2 only) ─────────────────
    # Generated by init-letsencrypt.sh: openssl dhparam -out dhparam.pem 2048
    ssl_dhparam /etc/letsencrypt/dhparam.pem;

    # ── OCSP Stapling ──────────────────────────────────────────────────────
    # nginx fetches and caches the OCSP response, serving it in the TLS
    # handshake. Reduces client latency and improves privacy (client doesn't
    # contact the CA directly).
    ssl_stapling        on;
    ssl_stapling_verify on;
    # Public resolvers for OCSP lookups; valid=300s caches DNS for 5 min
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;
    # Intermediate chain for OCSP response verification.
    # Both Let's Encrypt RSA and ECDSA chains root at ISRG Root X1;
    # using one chain file here is sufficient.
    ssl_trusted_certificate /etc/letsencrypt/live/easydigitalinvoice.com-ecdsa/chain.pem;

    # ── Security headers ───────────────────────────────────────────────────
    # HSTS: 2 years, includeSubDomains, preload
    # WARNING: Only add 'preload' after verifying your entire domain tree
    # is HTTPS-only. Submit at https://hstspreload.org once confirmed.
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload"  always;
    add_header X-Frame-Options            DENY                                             always;
    add_header X-Content-Type-Options     nosniff                                          always;
    add_header X-XSS-Protection           "1; mode=block"                                  always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"                always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"       always;
    # CORP: prevent cross-origin reads of app resources (Spectre-class side-channels)
    add_header Cross-Origin-Resource-Policy  "same-origin"                                 always;
    # COOP: isolate the browsing context; prevents cross-origin window references
    add_header Cross-Origin-Opener-Policy    "same-origin"                                 always;
    # COEP: require CORP/CORS for all sub-resources (enables cross-origin isolation)
    # All app resources are same-origin; no external CDN/analytics, so this is safe.
    add_header Cross-Origin-Embedder-Policy "require-corp"                               always;
    #
    # CSP notes:
    #   'unsafe-inline' on script-src is required by Next.js for hydration inline scripts.
    #   'unsafe-eval'   is required by Next.js for dynamic imports / webpack runtime.
    #   Tighten connect-src when adding CDN, analytics, or third-party API calls.
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # ── Next.js static assets ──────────────────────────────────────────────
    # Content-addressed filenames — safe to cache for 1 year (immutable).
    location /_next/static/ {
      proxy_pass         http://nextjs;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      add_header         Cache-Control     "public, max-age=31536000, immutable" always;
      add_header         X-Content-Type-Options nosniff always;
    }

    # ── API routes ─────────────────────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=40 nodelay;

      # ── Explicit CORS policy ─────────────────────────────────────────────
      # Allow only requests from the application's own origin.
      # Replace easydigitalinvoice.com with your real domain (e.g. https://app.example.com).
      # Credentials (cookies) are permitted because the frontend is same-origin.
      #
      # IMPORTANT: Do NOT set Access-Control-Allow-Origin to "*" — the app uses
      # httpOnly cookies and wildcard origins are incompatible with credentials.
      set $cors_origin "";
      if ($http_origin = "https://easydigitalinvoice.com") {
        set $cors_origin $http_origin;
      }
      if ($http_origin = "https://www.easydigitalinvoice.com") {
        set $cors_origin $http_origin;
      }

      add_header Access-Control-Allow-Origin      $cors_origin        always;
      add_header Access-Control-Allow-Credentials "true"              always;
      add_header Access-Control-Allow-Methods     "GET, POST, PATCH, DELETE, OPTIONS" always;
      add_header Access-Control-Allow-Headers     "Content-Type, Authorization, X-Encrypted" always;
      add_header Access-Control-Max-Age           "86400"             always;

      # Handle pre-flight OPTIONS requests without proxying to Next.js.
      if ($request_method = OPTIONS) {
        return 204;
      }

      proxy_pass         http://nextjs;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        $connection_upgrade;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      # Must be off for Next.js streaming (Suspense, Server Actions, SSE)
      proxy_buffering       off;
      # Generous timeouts for DB-heavy routes
      proxy_read_timeout    120s;
      proxy_connect_timeout  10s;
      proxy_send_timeout    120s;
    }

    # ── All other routes ───────────────────────────────────────────────────
    location / {
      limit_req zone=general burst=60 nodelay;

      proxy_pass         http://nextjs;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        $connection_upgrade;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_buffering       off;
      proxy_read_timeout    120s;
      proxy_connect_timeout  10s;
      proxy_send_timeout    120s;
    }
  }
}
