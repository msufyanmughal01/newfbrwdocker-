events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  upstream nextjs {
    server app:3000;
  }

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
  limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;

  # ── LOCAL / HTTP-ONLY ─────────────────────────────────────────
  # Used when no SSL certificate is available (local testing, staging).
  # Replace YOUR_DOMAIN below and comment out this block once HTTPS is live.
  server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/font-woff2;
    gzip_min_length 1000;

    # Static assets — long cache, full proxy headers
    location /_next/static/ {
      proxy_pass http://nextjs;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      add_header Cache-Control "public, max-age=31536000, immutable" always;
      add_header X-Content-Type-Options nosniff always;
    }

    # API rate limiting
    location /api/ {
      limit_req zone=api burst=10 nodelay;
      proxy_pass http://nextjs;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }

    # All other requests
    location / {
      limit_req zone=general burst=20 nodelay;
      proxy_pass http://nextjs;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }
  }

  # ── PRODUCTION HTTPS ──────────────────────────────────────────
  # Uncomment once you have a real SSL certificate for YOUR_DOMAIN.
  # Replace YOUR_DOMAIN with your actual domain (e.g. taxdigital.pk).
  #
  # server {
  #   listen 80;
  #   server_name YOUR_DOMAIN;
  #   return 301 https://$host$request_uri;
  # }
  #
